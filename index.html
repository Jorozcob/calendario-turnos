<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario de Turnos</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div>
          <h1>Calendario de Turnos</h1>
          <p class="subtitle">Rotación semanal de oficina y casa</p>
        </div>
        <button
          type="button"
          id="toggle-config"
          class="btn btn-secondary mobile-only"
          aria-expanded="true"
          aria-controls="config-panel"
        >
          Configuración
        </button>
      </header>

      <main class="app-main">
        <aside id="config-panel" class="config-panel">
          <h2>Configuración</h2>
          <form id="config-form">
            <div class="form-group">
              <label for="num-turnos">Número de turnos</label>
              <input
                type="number"
                id="num-turnos"
                name="num-turnos"
                min="2"
                max="10"
                required
              />
            </div>

            <div id="shift-names" class="shift-names"></div>

            <div class="form-group">
              <label for="fecha-inicio">Fecha de inicio</label>
              <input type="date" id="fecha-inicio" name="fecha-inicio" required />
              <p id="monday-hint" class="hint"></p>
            </div>

            <div class="form-group">
              <label for="turno-inicial">Turno en oficina la 1ª semana</label>
              <select id="turno-inicial" name="turno-inicial"></select>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Guardar</button>
              <button type="button" id="reset-config" class="btn btn-secondary">
                Restablecer
              </button>
            </div>
          </form>

          <p id="storage-warning" class="warning" hidden>
            No se pudo guardar la configuración en este navegador.
          </p>
        </aside>

        <section class="calendar-section">
          <div class="calendar-toolbar">
            <button type="button" id="prev-month" class="btn btn-secondary" aria-label="Mes anterior">
              ←
            </button>
            <h2 id="calendar-title"></h2>
            <button type="button" id="next-month" class="btn btn-secondary" aria-label="Mes siguiente">
              →
            </button>
            <button type="button" id="today-month" class="btn btn-secondary">Hoy</button>
          </div>

          <div id="legend" class="legend" aria-label="Leyenda de turnos"></div>

          <div id="calendar-grid" class="calendar-grid" aria-live="polite"></div>

          <div id="week-detail" class="week-detail">
            <h3 id="week-detail-title">Detalle de la semana</h3>
            <ul id="week-detail-list" class="week-detail-list"></ul>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
